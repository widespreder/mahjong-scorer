              </div>

              {/* Riichi selection */}
              <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 6 }}>リーチした人は？</div>
              <div style={{ fontSize: 11, color: t.dm, marginBottom: 8 }}>テンパイの人のみ選択可（なければそのまま「確定」）</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 14 }}>
                {players.map((p, i) => {
                  const isR = drawRiichi[i];
                  const tenpaiRequired = !drawTenpai[i];
                  return (
                    <button
                      key={i}
                      disabled={tenpaiRequired}
                      style={{
                        padding: "10px 8px",
                        border: `2px solid ${isR ? t.gd : t.bd}`,
                        borderRadius: 10,
                        background: isR ? t.gdS : "transparent",
                        color: tenpaiRequired ? t.dm : isR ? t.gd : t.tx,
                        fontSize: 13, fontWeight: 700,
                        cursor: tenpaiRequired ? "not-allowed" : "pointer",
                        opacity: tenpaiRequired ? 0.4 : 1,
                        textAlign: "center", transition: "all 0.12s",
                      }}
                      title={tenpaiRequired ? "先にテンパイにしてください" : ""}
                      onClick={() => { const n = [...drawRiichi]; n[i] = !n[i]; setDrawRiichi(n); }}
                    >
                      <div style={{ fontSize: 11, color: isR ? t.gd : t.dm, marginBottom: 2 }}>{WINDS[(i - dealerIdx + 4) % 4]}{i === dealerIdx ? " (親)" : ""}</div>
                      <div>{p}</div>
                      <div style={{ fontSize: 11, marginTop: 4, color: tenpaiRequired ? t.rd : "inherit" }}>
                        {tenpaiRequired ? "✕ テンパイ要" : isR ? "🔴 リーチ" : "—"}
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* Preview payment */}
              {(() => {
                const tc = drawTenpai.filter(Boolean).length;
                const nc = 4 - tc;
                const rc = drawRiichi.filter(Boolean).length;
                const notenPay = (tc > 0 && tc < 4) ? Math.floor(3000 / nc) : 0;
                const tenpaiGet = (tc > 0 && tc < 4) ? Math.floor(3000 / tc) : 0;
                if (tc === 0 || tc === 4) {
                  if (rc === 0) {
                    return (
                      <div style={{ textAlign: "center", fontSize: 13, color: t.dm, marginBottom: 12 }}>
                        {tc === 0 ? "全員ノーテン — 罰符なし" : "全員テンパイ — 罰符なし"}
                      </div>
                    );
                  }
                }
                return (
                  <div style={{ background: t.sf, borderRadius: 10, padding: 12, marginBottom: 12 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 6 }}>合計の増減</div>
                    {players.map((p, i) => {
                      let diff = 0;
                      if (tc > 0 && tc < 4) diff += drawTenpai[i] ? tenpaiGet : -notenPay;
                      if (drawRiichi[i]) diff -= 1000;
                      return (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 13 }}>
                          <span>{p}{drawRiichi[i] ? " 🔴" : ""}</span>
                          <span style={{ fontWeight: 700, color: diff > 0 ? t.gn : diff < 0 ? t.rd : t.tx }}>
                            {diff > 0 ? "+" : ""}{diff.toLocaleString()}
                          </span>
                        </div>
                      );
                    })}
                    {rc > 0 && (
                      <div style={{ fontSize: 11, color: t.dm, marginTop: 6, paddingTop: 6, borderTop: `1px solid ${t.bd}33` }}>
                        リーチ棒 {rc}本 ({(rc * 1000).toLocaleString()}点) は次局の供託へ
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Renchan info */}
              {(() => {
                const cfg = gameConfig || {};
                const dealerTenpai = drawTenpai[dealerIdx];
                let renchanText = "";
                if (cfg.agariRenchan) {
                  renchanText = "あがり連荘 → 親が流れます";
                } else if (cfg.tenpaiRenchan) {
                  renchanText = dealerTenpai ? "親テンパイ → 連荘" : "親ノーテン → 親が流れます";
                }
                if (!renchanText) return null;
                return (
                  <div style={{ textAlign: "center", fontSize: 12, color: t.dm, marginBottom: 12, padding: "6px 0", borderTop: `1px solid ${t.bd}33` }}>
                    {renchanText}
                  </div>
                );
              })()}

              <button style={actionBtn("p")} onClick={applyDraw}>確定</button>
              <button style={actionBtn()} onClick={resetDrawWiz}>キャンセル</button>
            </div>
          </div>
        </div>
      )}

      {/* History */}
      {rounds.length > 0 && (
        <div style={card}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 8, letterSpacing: "0.05em" }}>対局履歴</div>
          {rounds.map((r, idx) => (
            <div key={idx} style={{ padding: "6px 0", borderBottom: `1px solid ${t.bd}33`, fontSize: 12, display: "flex", justifyContent: "space-between" }}>
              <span style={{ color: t.dm }}>{r.wind}{r.dealer + 1}局{r.honba > 0 ? ` ${r.honba}本場` : ""}</span>
              {r.draw ? (
                <span style={{ color: t.dm }}>
                  流局
                  {r.tenpai && r.tenpai.some(Boolean) && (
                    <span style={{ marginLeft: 4, color: t.gn }}>
                      聴{r.tenpai.map((tp, i) => tp ? players[i]?.charAt(0) : null).filter(Boolean).join("")}
                    </span>
                  )}
                </span>
              ) : (
                <span>
                  <span style={{ color: t.ac, fontWeight: 600 }}>{players[r.winner]}</span>
                  {" "}<span style={{ color: t.dm }}>{r.han >= 13 ? "役満" : r.fu ? `${r.han}翻${r.fu}符` : `${r.han}翻`}</span>
                  {" "}<span style={{ fontWeight: 700 }}>{r.score?.toLocaleString()}</span>
                  {r.limitName && <span style={{ color: t.gd, marginLeft: 4 }}>{r.limitName}</span>}
                </span>
              )}
            </div>
          ))}
        </div>
      )}

      {/* アガリやめ：オーラス親トップで親連荘中なら終了ボタン表示 */}
      {(() => {
        const cfg = gameConfig || {};
        const ruleSet = cfg.rules || {};
        if (!ruleSet.agariYame) return null;
        const isOrlast = (cfg.matchType === "tonpu" && dealerIdx === 3) ||
                         (cfg.matchType === "hanchan" && roundWind === "南" && dealerIdx === 3);
        if (!isOrlast) return null;
        const parentScore = scores[dealerIdx];
        const isTop = scores.every((s, i) => {
          if (i === dealerIdx) return true;
          if (parentScore !== s) return parentScore > s;
          return dealerIdx < i;
        });
        if (!isTop) return null;
        return (
          <button style={{ ...actionBtn("p"), background: t.gd, marginBottom: 8 }} onClick={() => {
            if (window.confirm("オーラス親トップ、アガリやめで終了しますか？")) setGameFinished(true);
          }}>🏆 アガリやめで対局終了</button>
        );
      })()}

      <button style={actionBtn()} onClick={() => {
        setSuspendedGame({
          config: gameConfig,
          players: [...players],
          scores: [...scores],
          rounds: [...rounds],
          dealerIdx,
          roundWind,
          honba,
          riichiBets,
        });
        setGameStarted(false);
        setView("home");
      }}>⏸ 対局保留</button>
    </div>
  );

  // ══════════════════════════════════
  // ── GAME FINISHED SCREEN ──
  // ══════════════════════════════════
  const renderGameFinished = () => {
    const ruleSet = gameConfig?.rules || {};
    const returnPt = ruleSet.returnPoints || 30000;
    const startPt = ruleSet.startPoints || 25000;
    // 残り供託（リーチ棒）をトップに加算
    const leftoverRiichi = riichiBets * 1000;
    // 順位確定時のスコア（残り供託を1位に上乗せ）。同点時は起家(東家)から近い順=index小さい方優先
    const adjusted = players.map((p, i) => ({ name: p, rawScore: scores[i], idx: i }));
    const sortedByRaw = [...adjusted].sort((a, b) => b.rawScore - a.rawScore || a.idx - b.idx);
    const topIdx = sortedByRaw[0].idx;
    const adjustedWithRiichi = adjusted.map(a => ({
      ...a,
      finalRawScore: a.rawScore + (a.idx === topIdx ? leftoverRiichi : 0),
    }));
    // Oka: (returnPt - startPt) * 4 goes to 1st place
    const okaPool = (returnPt - startPt) * 4;
    const finalResults = adjustedWithRiichi.map(a => {
      const isFirst = a.idx === topIdx;
      const diff = a.finalRawScore - returnPt;
      const finalPt = diff + (isFirst ? okaPool : 0);
      return { ...a, diff, finalPt };
    });
    const sorted = [...finalResults].sort((a, b) => b.finalPt - a.finalPt || a.idx - b.idx);

    return (
      <div style={body}>
        <div style={{ textAlign: "center", padding: "24px 0 16px" }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🏆</div>
          <h2 style={{ fontSize: 20, fontWeight: 800, margin: "0 0 4px" }}>対局終了</h2>
          <p style={{ fontSize: 13, color: t.dm, margin: 0 }}>
            {gameConfig?.date} / {gameConfig?.matchType === "tonpu" ? "東風戦" : "半荘戦"} / {rounds.length}局
          </p>
        </div>

        {/* Raw scores */}
        <div style={card}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 10, letterSpacing: "0.05em" }}>最終持ち点</div>
          {[...adjustedWithRiichi].sort((a, b) => b.finalRawScore - a.finalRawScore || a.idx - b.idx).map((s, rank) => (
            <div key={s.idx} style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "10px 14px", borderRadius: 10, marginBottom: 4,
              background: rank === 0 ? t.gdS : "transparent",
              border: rank === 0 ? `1px solid ${t.gd}44` : `1px solid ${t.bd}33`,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16, fontWeight: 900, color: rank === 0 ? t.gd : rank === 1 ? t.tx : t.dm, width: 24 }}>{rank + 1}</span>
                <span style={{ fontSize: 14, fontWeight: 600 }}>{s.name}</span>
                {rank === 0 && leftoverRiichi > 0 && <span style={{ fontSize: 10, color: t.gd }}>+残供託{leftoverRiichi.toLocaleString()}</span>}
              </div>
              <span style={{ fontSize: 16, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: s.finalRawScore < 0 ? t.rd : t.tx }}>{s.finalRawScore.toLocaleString()}</span>
            </div>
          ))}
          {leftoverRiichi > 0 && (
            <div style={{ fontSize: 11, color: t.dm, marginTop: 8, textAlign: "center" }}>
              場に残ったリーチ棒 {riichiBets}本 ({leftoverRiichi.toLocaleString()}点) は1位へ
            </div>
          )}
        </div>

        {/* Oka calculation */}
        <div style={card}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 6, letterSpacing: "0.05em" }}>精算（オカ計算）</div>
          <div style={{ fontSize: 11, color: t.dm, marginBottom: 12 }}>
            返し点 {returnPt.toLocaleString()} / オカ {okaPool > 0 ? `+${okaPool.toLocaleString()} (1位へ)` : "なし"}
          </div>
          {sorted.map((s, rank) => (
            <div key={s.idx} style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "12px 14px", borderRadius: 10, marginBottom: 6,
              background: rank === 0 ? t.gdS : "transparent",
              border: rank === 0 ? `1px solid ${t.gd}44` : `1px solid ${t.bd}33`,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 18, fontWeight: 900, color: rank === 0 ? t.gd : rank === 1 ? t.tx : t.dm, width: 24 }}>{rank + 1}</span>
                <span style={{ fontSize: 15, fontWeight: 600 }}>{s.name}</span>
              </div>
              <span style={{ fontSize: 18, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: s.finalPt > 0 ? t.gn : s.finalPt < 0 ? t.rd : t.tx }}>
                {s.finalPt > 0 ? "+" : ""}{s.finalPt.toLocaleString()}
              </span>
            </div>
          ))}
        </div>

        {/* Round history */}
        <div style={card}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 8, letterSpacing: "0.05em" }}>局の記録</div>
          {rounds.map((r, idx) => (
            <div key={idx} style={{ padding: "6px 0", borderBottom: `1px solid ${t.bd}33`, fontSize: 12, display: "flex", justifyContent: "space-between" }}>
              <span style={{ color: t.dm }}>{r.wind}{r.dealer + 1}局{r.honba > 0 ? ` ${r.honba}本場` : ""}</span>
              {r.draw ? (
                <span style={{ color: t.dm }}>
                  流局
                  {r.tenpai && r.tenpai.some(Boolean) && (
                    <span style={{ marginLeft: 4, color: t.gn }}>
                      聴{r.tenpai.map((tp, i) => tp ? players[i]?.charAt(0) : null).filter(Boolean).join("")}
                    </span>
                  )}
                </span>
              ) : (
                <span>
                  <span style={{ color: t.ac, fontWeight: 600 }}>{players[r.winner]}</span>
                  {" "}<span style={{ color: t.dm }}>{r.han >= 13 ? "役満" : r.fu ? `${r.han}翻${r.fu}符` : `${r.han}翻`}</span>
                  {" "}<span style={{ fontWeight: 700 }}>{r.score?.toLocaleString()}</span>
                  {r.limitName && <span style={{ color: t.gd, marginLeft: 4 }}>{r.limitName}</span>}
                </span>
              )}
            </div>
          ))}
        </div>

        <button style={actionBtn("p")} onClick={() => {
          if (rounds.length > 0) {
            setGameHistory(prev => [...prev, {
              id: Date.now(),
              date: gameConfig?.date || "",
              matchType: gameConfig?.matchType || "",
              players: [...players],
              finalScores: [...scores],
              okaResults: sorted.map(s => ({ name: s.name, finalPt: s.finalPt })),
              rounds: [...rounds],
              rules: gameConfig?.rules || {},
            }]);
          }
          setGameStarted(false);
          setGameFinished(false);
          setView("home");
        }}>履歴に保存してメニューへ</button>
      </div>
    );
  };

  // ══════════════════════════════════
  // ── GAME VIEW ROUTER ──
  // ══════════════════════════════════
  const renderGame = () => {
    if (gameFinished) return renderGameFinished();
    if (gameStarted) return renderGamePlay();
    return renderSetup();
  };

  // ══════════════════════════════════
  // ── HISTORY VIEW ──
  // ══════════════════════════════════
  const [historyDetail, setHistoryDetail] = useState(null);

  const renderHistory = () => (
    <div style={body}>
      {historyDetail === null ? (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <span style={{ fontSize: 16, fontWeight: 700 }}>対局履歴</span>
            {gameHistory.length > 0 && (
              <button
                onClick={() => {
                  if (window.confirm(`${gameHistory.length}件すべての履歴を削除します。よろしいですか？\n\n※ この操作は取り消せません。`)) {
                    setGameHistory([]);
                  }
                }}
                style={{
                  padding: "6px 12px", border: `1px solid ${t.rd}55`, borderRadius: 8,
                  background: "transparent", color: t.rd, fontSize: 12, fontWeight: 700, cursor: "pointer",
                }}
              >🗑 全削除</button>
            )}
          </div>
          {gameHistory.length === 0 ? (
            <div style={{ ...card, textAlign: "center", padding: 32 }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>📋</div>
              <div style={{ fontSize: 14, color: t.dm }}>まだ記録がありません</div>
              <div style={{ fontSize: 12, color: t.dm, marginTop: 4 }}>対局を終了すると自動的に保存されます</div>
            </div>
          ) : (
            [...gameHistory].reverse().map((g, idx) => {
              const sorted = g.players.map((p, i) => ({ name: p, score: g.finalScores[i] })).sort((a, b) => b.score - a.score);
              return (
                <div key={g.id} style={{ ...card, padding: 0, position: "relative", overflow: "hidden" }}>
                  <button
                    onClick={() => setHistoryDetail(g)}
                    style={{ width: "100%", textAlign: "left", cursor: "pointer", padding: "16px 50px 16px 16px", background: "transparent", border: "none", color: t.tx, transition: "all 0.12s" }}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 14, fontWeight: 700 }}>{g.date}</span>
                      <span style={{ fontSize: 12, color: t.dm, padding: "2px 10px", background: t.sf, borderRadius: 6 }}>
                        {g.matchType === "tonpu" ? "東風" : "半荘"}
                      </span>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {sorted.map((s, si) => (
                        <span key={si} style={{
                          fontSize: 12, padding: "3px 8px", borderRadius: 6,
                          background: si === 0 ? t.gdS : t.sf,
                          color: si === 0 ? t.gd : t.tx,
                          fontWeight: si === 0 ? 700 : 400,
                          border: `1px solid ${si === 0 ? t.gd + "33" : t.bd}`,
                        }}>
                          {si === 0 && "🏆 "}{s.name} {s.score.toLocaleString()}
                        </span>
                      ))}
                    </div>
                    <div style={{ fontSize: 11, color: t.dm, marginTop: 6 }}>{g.rounds.length}局</div>
                  </button>
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      if (window.confirm(`${g.date} の対局履歴を削除します。よろしいですか？`)) {
                        setGameHistory(prev => prev.filter(h => h.id !== g.id));
                      }
                    }}
                    style={{
                      position: "absolute", top: 12, right: 12,
                      width: 28, height: 28, borderRadius: 6,
                      border: `1px solid ${t.bd}`, background: t.sf,
                      color: t.dm, fontSize: 14, cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      transition: "all 0.12s",
                    }}
                    title="この履歴を削除"
                  >🗑</button>
                </div>
              );
            })
          )}
        </>
      ) : (
        <>
          <button style={backBtn} onClick={() => setHistoryDetail(null)}>← 一覧に戻る</button>
          <div style={{ ...card, padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontSize: 16, fontWeight: 700 }}>{historyDetail.date}</span>
              <span style={{ fontSize: 12, color: t.dm, padding: "2px 10px", background: t.sf, borderRadius: 6 }}>
                {historyDetail.matchType === "tonpu" ? "東風戦" : "半荘戦"}
              </span>
            </div>

            {/* Final scores ranked */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 8 }}>最終スコア</div>
              {historyDetail.players
                .map((p, i) => ({ name: p, score: historyDetail.finalScores[i], idx: i }))
                .sort((a, b) => b.score - a.score)
                .map((s, rank) => (
                  <div key={s.idx} style={{
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    padding: "8px 12px", borderRadius: 8, marginBottom: 4,
                    background: rank === 0 ? t.gdS : "transparent",
                    border: rank === 0 ? `1px solid ${t.gd}33` : "1px solid transparent",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 14, fontWeight: 800, color: rank === 0 ? t.gd : t.dm, width: 20 }}>{rank + 1}</span>
                      <span style={{ fontSize: 14, fontWeight: 600 }}>{s.name}</span>
                    </div>
                    <span style={{ fontSize: 16, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: s.score < 0 ? t.rd : t.tx }}>
                      {s.score.toLocaleString()}
                    </span>
                  </div>
                ))
              }
            </div>

            {/* Round history */}
            <div style={{ fontSize: 12, fontWeight: 700, color: t.dm, marginBottom: 8 }}>局の記録</div>
            {historyDetail.rounds.map((r, idx) => (
              <div key={idx} style={{ padding: "6px 0", borderBottom: `1px solid ${t.bd}33`, fontSize: 12, display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: t.dm }}>{r.wind}{r.dealer + 1}局{r.honba > 0 ? ` ${r.honba}本場` : ""}</span>
                {r.draw ? (
                  <span style={{ color: t.dm }}>
                    流局
                    {r.tenpai && r.tenpai.some(Boolean) && (
                      <span style={{ marginLeft: 4, color: t.gn }}>
                        聴{r.tenpai.map((tp, i) => tp ? historyDetail.players[i]?.charAt(0) : null).filter(Boolean).join("")}
                      </span>
                    )}
                  </span>
                ) : (
                  <span>
                    <span style={{ color: t.ac, fontWeight: 600 }}>{historyDetail.players[r.winner]}</span>
                    {" "}<span style={{ color: t.dm }}>{r.han >= 13 ? "役満" : r.fu ? `${r.han}翻${r.fu}符` : `${r.han}翻`}</span>
                    {" "}<span style={{ fontWeight: 700 }}>{r.score?.toLocaleString()}</span>
                    {r.limitName && <span style={{ color: t.gd, marginLeft: 4 }}>{r.limitName}</span>}
                  </span>
                )}
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );

  return (
    <>
      <style>{globalStyle}</style>
      <div style={{ minHeight: "100vh", background: t.bg, color: t.tx, fontFamily: "'Noto Sans JP','Hiragino Kaku Gothic ProN',system-ui,sans-serif", maxWidth: 440, margin: "0 auto", overflowX: "clip", width: "100%" }}>
        <div style={{ padding: "16px 20px 12px", borderBottom: `1px solid ${t.bd}` }}>
          <h1 style={{ fontSize: 20, fontWeight: 800, margin: 0, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, cursor: "pointer" }} onClick={() => setView("home")}>🀄 <span>麻雀スコアラー</span></h1>
        </div>
        {view === "home" && renderHome()}
        {view === "calc" && renderCalc()}
        {view === "game" && renderGame()}
        {view === "history" && renderHistory()}
        {view === "quiz" && renderQuiz()}
        {view === "fuQuiz" && renderFuQuiz()}
        {view === "dict" && renderDict()}
        {showFuHelp && <FuHelpModal />}

        {/* 役の詳細モーダル（長押しで起動） */}
        {infoYakuIdx !== null && (() => {
          const y = YAKU_DATA[infoYakuIdx];
          const m = y.name.match(/^([^（]+)（([^）]+)）$/);
          const main = m ? m[1].trim() : y.name;
          const reading = m ? m[2] : null;
          // 関連する競合役・前提役
          const conflictSet = YAKU_CONFLICT_MAP.get(y.name);
          const conflictNames = conflictSet ? [...conflictSet].map(n => n.match(/^([^（]+)/)?.[1] || n) : [];
          const requiresArr = YAKU_REQUIRES_MAP.get(y.name);
          const requiresNames = requiresArr ? requiresArr.map(n => n.match(/^([^（]+)/)?.[1] || n) : [];
          return (
            <div
              style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
              onClick={() => setInfoYakuIdx(null)}
            >
              <div
                style={{ background: t.card, borderRadius: 14, padding: 20, maxWidth: 380, width: "100%", border: `1px solid ${t.bd}`, maxHeight: "85vh", overflowY: "auto" }}
                onClick={e => e.stopPropagation()}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 20, fontWeight: 900, color: t.tx }}>{main}</div>
                    {reading && <div style={{ fontSize: 12, color: t.dm, marginTop: 2 }}>{reading}</div>}
                  </div>
                  <button style={{ background: "none", border: "none", color: t.dm, fontSize: 22, cursor: "pointer", lineHeight: 1, padding: 4 }} onClick={() => setInfoYakuIdx(null)}>✕</button>
                </div>

                <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
                  <span style={{ padding: "4px 10px", borderRadius: 6, background: t.acS, color: t.ac, fontSize: 12, fontWeight: 700 }}>
                    門前: {y.han >= 13 ? "役満" : `${y.han}翻`}
                  </span>
                  {y.naki !== null
                    ? <span style={{ padding: "4px 10px", borderRadius: 6, background: t.gnS, color: t.gn, fontSize: 12, fontWeight: 700 }}>鳴き: {y.naki >= 13 ? "役満" : `${y.naki}翻`}</span>
                    : <span style={{ padding: "4px 10px", borderRadius: 6, background: t.rdS, color: t.rd, fontSize: 12, fontWeight: 700 }}>鳴き: ✕ 不可</span>
                  }
                  {y.cat && <span style={{ padding: "4px 10px", borderRadius: 6, background: t.sf, color: t.dm, fontSize: 12, fontWeight: 700 }}>カテゴリ: {y.cat}</span>}
                </div>

                <div style={{ background: t.sf, borderRadius: 10, padding: 14, fontSize: 14, lineHeight: 1.7, color: t.tx, marginBottom: 14 }}>
                  {y.desc}
                </div>

                {requiresNames.length > 0 && (
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, color: t.dm, marginBottom: 4, fontWeight: 700 }}>📋 前提条件</div>
                    <div style={{ fontSize: 13, color: t.tx }}>{requiresNames.join(" / ")} のいずれかが必要</div>
                  </div>
                )}

                {conflictNames.length > 0 && (
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, color: t.dm, marginBottom: 4, fontWeight: 700 }}>⚠ 併用不可</div>
                    <div style={{ fontSize: 12, color: t.dm, lineHeight: 1.6 }}>{conflictNames.join("、")}</div>
                  </div>
                )}

                <button
                  style={{ width: "100%", padding: "12px", border: "none", borderRadius: 10, background: t.ac, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 14 }}
                  onClick={() => setInfoYakuIdx(null)}
                >閉じる</button>
              </div>
            </div>
          );
        })()}
      </div>
    </>
  );
}


ReactDOM.render(<MahjongScorer />, document.getElementById("root"));
</script>
</body>
</html>
